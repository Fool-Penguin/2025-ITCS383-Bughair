# ---------------------------------------------------------------
# render.yaml — Render Blueprint for FitPay Elite
#
# Deploy:  Push to GitHub → Render auto-detects this file.
# Or:      Dashboard → New → Blueprint → select this repo.
#
# Environment variables to set in the Render dashboard:
#   DATABASE_URL  – your Supabase Postgres connection string
#   JWT_SECRET    – secret for JWT signing
# ---------------------------------------------------------------

services:
  - type: web
    name: fitpay-elite
    runtime: docker
    region: singapore           # closest to Thailand
    plan: free                  # change to 'starter' for always-on

    # ── Build ────────────────────────────────────────
    dockerfilePath: ./Dockerfile
    dockerContext: .


    # ── Environment ──────────────────────────────────
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false             # set in Render dashboard (secret)
      - key: JWT_SECRET
        sync: false             # set in Render dashboard (secret)
      - key: APP_BASE_URL
        sync: false             # e.g. https://fitpay-elite.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: SENDGRID_FROM
        sync: false

    # ── Health check ─────────────────────────────────
    healthCheckPath: /
