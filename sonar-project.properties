sonar.projectKey=Fool-Penguin_2025-ITCS383-Bughair
sonar.organization=fool-penguin

# Project display name
sonar.projectName=2025-ITCS383-Bughair

# Source directories — all 5 microservices
sonar.sources=implementations/Admin, \
              implementations/AuthMembership, \
              implementations/course-service, \
              implementations/payment-service, \
              implementations/reservation-service

# Exclude non-source files and SQL scripts to avoid PL/SQL warnings
sonar.exclusions=**/node_modules/**,**/node_modules.zip,**/*.db,**/coverage/**,**/*.sql

# Coverage report (generated by course-service Jest in CI)
sonar.javascript.lcov.reportPaths=implementations/course-service/coverage/lcov.info

# Coverage scope: keep static analysis for all services, but only enforce coverage
# on services that currently generate reliable LCOV reports in CI.
sonar.coverage.exclusions=implementations/Admin/**, \
                          implementations/AuthMembership/**, \
                          implementations/payment-service/**, \
                          implementations/reservation-service/**, \
                          implementations/course-service/frontend/**, \
                          implementations/course-service/src/config/**

# Encoding
sonar.sourceEncoding=UTF-8
