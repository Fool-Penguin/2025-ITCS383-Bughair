<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profile — FITNESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
            --lime: #c8f53c; --lime2: #d9ff52;
            --border: #2a2a2a; --text: #f2f2f0; --text2: #888; --r: 4px;
            --danger: #ff4545; --success: #4ade80;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; }

        nav {
            height: 64px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; background: rgba(13,13,13,0.95);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--lime); text-decoration: none; }
        .nav-back { color: var(--text2); text-decoration: none; font-weight: 700; font-size: 0.85rem; transition: 0.2s; }
        .nav-back:hover { color: var(--lime); }

        .container {
            max-width: 600px; margin: 60px auto; padding: 0 20px;
        }

        .page-title {
            font-family: 'Bebas Neue', sans-serif; font-size: 3rem;
            letter-spacing: 2px; margin-bottom: 10px; line-height: 0.95;
        }
        .page-title span { color: var(--lime); }
        .page-desc { color: var(--text2); font-size: 0.9rem; margin-bottom: 40px; }

        .profile-card {
            background: var(--bg2); border: 1px solid var(--border);
            border-radius: 12px; padding: 40px; position: relative;
        }

        /* Avatar */
        .avatar-section { text-align: center; margin-bottom: 30px; }
        .avatar-wrapper {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 15px;
            border: 3px solid var(--border); overflow: hidden; position: relative;
            cursor: pointer; transition: 0.3s; background: var(--bg3);
        }
        .avatar-wrapper:hover { border-color: var(--lime); }
        .avatar-wrapper img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .avatar-placeholder {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            font-family: 'Bebas Neue', sans-serif; font-size: 2.5rem; color: rgba(200,245,60,0.2);
        }
        .avatar-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 0.2s; font-size: 0.75rem; color: var(--lime); font-weight: 700;
        }
        .avatar-wrapper:hover .avatar-overlay { opacity: 1; }
        .avatar-hint { font-size: 0.75rem; color: var(--text2); }

        .field { margin-bottom: 22px; }
        .field label {
            display: block; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text2); margin-bottom: 8px;
        }
        .field input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            color: var(--text); font-family: 'Barlow', sans-serif; padding: 12px 15px;
            border-radius: var(--r); outline: none; transition: 0.2s; font-size: 0.95rem;
        }
        .field input:focus { border-color: var(--lime); }
        .field input:disabled { opacity: 0.5; cursor: not-allowed; }

        .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .btn-save {
            width: 100%; background: var(--lime); color: #0d0d0d; border: none;
            padding: 14px; font-weight: 800; font-family: 'Barlow', sans-serif;
            text-transform: uppercase; letter-spacing: 2px; border-radius: var(--r);
            cursor: pointer; transition: 0.2s; margin-top: 15px; font-size: 0.95rem;
        }
        .btn-save:hover { background: var(--lime2); transform: translateY(-1px); }
        .btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--bg2); border: 1px solid var(--lime);
            border-radius: 10px; padding: 12px 18px; font-size: 0.85rem;
            z-index: 400; transform: translateY(80px); opacity: 0; transition: 0.28s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: var(--danger); }
        .toast.success { border-color: var(--success); }

        .member-badge {
            display: inline-block; font-size: 0.65rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 4px 10px; border-radius: 4px; margin-bottom: 15px;
            background: rgba(200,245,60,0.1); color: var(--lime); border: 1px solid rgba(200,245,60,0.25);
        }

        @media (max-width: 600px) {
            .field-row { grid-template-columns: 1fr; }
            .container { margin: 30px auto; }
        }
    </style>
</head>
<body>

<nav>
    <a href="/home" class="nav-logo">FITNESS</a>
    <a href="/home" class="nav-back">← Back to Dashboard</a>
</nav>

<div class="container">
    <h1 class="page-title">EDIT <span>PROFILE</span></h1>
    <p class="page-desc">Update your personal information and profile picture.</p>

    <div class="profile-card">
        <div class="avatar-section">
            <div class="avatar-wrapper" onclick="document.getElementById('avatar-input').click()">
                <div class="avatar-placeholder" id="avatar-placeholder">?</div>
                <img id="avatar-preview" src="" alt="" style="display:none;">
                <div class="avatar-overlay">📷 Change</div>
            </div>
            <div class="avatar-hint">Click to upload profile picture</div>
            <input type="file" id="avatar-input" accept="image/*" style="display:none;" onchange="handleAvatar(event)">
        </div>

        <div class="member-badge" id="member-badge">MEM-000000</div>

        <div class="field">
            <label>Email Address</label>
            <input type="email" id="profile-email" disabled>
        </div>

        <div class="field">
            <label>Full Name</label>
            <input type="text" id="profile-name" placeholder="Your Name">
        </div>

        <div class="field">
            <label>Phone Number</label>
            <input type="tel" id="profile-phone" placeholder="e.g. 081-234-5678">
        </div>

        <button class="btn-save" id="btn-save" onclick="saveProfile()">Save Changes →</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/api';
    const token = localStorage.getItem('token');
    let profilePicBase64 = null;

    // Redirect if not logged in
    if (!token) {
        window.location.href = '/auth.html';
    }

    // Load profile on page load
    window.onload = async function() {
        try {
            const res = await fetch(`${API}/auth/profile`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (data.success && data.data) {
                const u = data.data;
                document.getElementById('profile-email').value = u.email || '';
                document.getElementById('profile-name').value = u.full_name || '';
                document.getElementById('profile-phone').value = u.phone || '';
                document.getElementById('member-badge').textContent = u.member_id || 'MEMBER';

                // Avatar
                const initials = (u.full_name || '?').split(' ').map(n => n[0]).join('').toUpperCase();
                document.getElementById('avatar-placeholder').textContent = initials;

                if (u.profile_picture) {
                    document.getElementById('avatar-preview').src = u.profile_picture;
                    document.getElementById('avatar-preview').style.display = 'block';
                    document.getElementById('avatar-placeholder').style.display = 'none';
                    profilePicBase64 = u.profile_picture;
                }
            }
        } catch (err) {
            showToast('Failed to load profile', 'error');
        }
    };

    function handleAvatar(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) {
            showToast('Image must be under 2MB', 'error');
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            profilePicBase64 = e.target.result;
            document.getElementById('avatar-preview').src = profilePicBase64;
            document.getElementById('avatar-preview').style.display = 'block';
            document.getElementById('avatar-placeholder').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }

    async function saveProfile() {
        const btn = document.getElementById('btn-save');
        const full_name = document.getElementById('profile-name').value.trim();
        const phone = document.getElementById('profile-phone').value.trim();

        if (!full_name) {
            showToast('Name is required', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'SAVING...';

        try {
            const body = { full_name, phone };
            if (profilePicBase64) body.profile_picture = profilePicBase64;

            const res = await fetch(`${API}/auth/profile`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });
            const data = await res.json();

            if (data.success) {
                // Update localStorage user data
                const user = JSON.parse(localStorage.getItem('user') || '{}');
                user.name = full_name;
                user.profile_picture = data.data?.profile_picture || profilePicBase64 || user.profile_picture;
                localStorage.setItem('user', JSON.stringify(user));

                showToast('Profile updated successfully!', 'success');
            } else {
                showToast(data.message || 'Failed to update', 'error');
            }
        } catch (err) {
            showToast('Connection error', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Save Changes →';
        }
    }

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast show${type ? ' ' + type : ''}`;
        clearTimeout(t._t);
        t._t = setTimeout(() => t.className = 'toast', 3200);
    }
</script>

</body>
</html>
