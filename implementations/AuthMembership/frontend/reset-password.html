<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — FITNESS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800&display=swap');
        :root {
            --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
            --lime: #c8f53c; --lime2: #d9ff52;
            --border: #2a2a2a; --text: #f2f2f0; --text2: #888; --r: 4px;
            --danger: #ff4545; --success: #4ade80;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        nav {
            height: 64px; display: flex; align-items: center;
            padding: 0 40px; background: rgba(13,13,13,0.95);
            border-bottom: 1px solid var(--border);
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--lime); text-decoration: none; }

        .auth-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding-top: 64px; position: relative; overflow: hidden;
        }
        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
            background-size: 60px 60px; opacity: .15;
        }
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(200,245,60,0.05) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .card {
            position: relative; z-index: 1;
            max-width: 460px; width: 100%; margin: 20px;
            background: var(--bg2); border: 1px solid var(--border);
            padding: 50px 40px; border-radius: 2px;
        }

        .card-icon {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(200,245,60,0.08); border: 1px solid rgba(200,245,60,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin-bottom: 25px;
        }

        h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 10px; }
        h2 span { color: var(--lime); }
        .desc { color: var(--text2); font-size: 0.88rem; line-height: 1.6; margin-bottom: 30px; }

        .field { margin-bottom: 20px; }
        .field label {
            display: block; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text2); margin-bottom: 8px;
        }
        .field input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            color: var(--text); font-family: 'Barlow', sans-serif; padding: 13px 15px;
            border-radius: var(--r); outline: none; transition: 0.2s; font-size: 0.95rem;
        }
        .field input:focus { border-color: var(--lime); }

        /* Password strength indicator */
        .strength-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 8px; overflow: hidden; }
        .strength-fill { height: 100%; border-radius: 2px; transition: width 0.3s, background 0.3s; width: 0%; }
        .strength-text { font-size: 0.7rem; margin-top: 5px; color: var(--text2); }

        .btn-submit {
            width: 100%; background: var(--lime); color: #0d0d0d; border: none;
            padding: 14px; font-weight: 800; font-family: 'Barlow', sans-serif;
            text-transform: uppercase; letter-spacing: 2px; border-radius: var(--r);
            cursor: pointer; transition: 0.2s; font-size: 0.95rem;
        }
        .btn-submit:hover { background: var(--lime2); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .success-msg {
            display: none; text-align: center; padding: 20px;
            background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25);
            border-radius: 8px; margin-top: 20px;
        }
        .success-msg .check { font-size: 2.5rem; margin-bottom: 10px; }
        .success-msg p { color: var(--text2); font-size: 0.88rem; line-height: 1.6; }
        .success-msg .highlight { color: var(--success); font-weight: 700; }
        .success-msg a {
            display: inline-block; margin-top: 15px; background: var(--lime); color: #0d0d0d;
            padding: 10px 25px; text-decoration: none; font-weight: 800; border-radius: var(--r);
            text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem;
        }

        .error-card {
            display: none; text-align: center; padding: 30px;
        }
        .error-card .icon { font-size: 2.5rem; margin-bottom: 15px; }
        .error-card p { color: var(--text2); }
        .error-card a { color: var(--lime); font-weight: 700; text-decoration: none; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--bg2); border: 1px solid var(--lime);
            border-radius: 10px; padding: 12px 18px; font-size: 0.85rem;
            z-index: 400; transform: translateY(80px); opacity: 0; transition: 0.28s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: var(--danger); }
    </style>
</head>
<body>

<nav>
    <a href="/auth.html" class="nav-logo">FITNESS</a>
</nav>

<div class="auth-container">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="card">
        <div id="form-section">
            <div class="card-icon">🔐</div>
            <h2>SET NEW <span>PASSWORD</span></h2>
            <p class="desc">Enter your new password below. Make sure it's at least 6 characters.</p>

            <div class="field">
                <label>New Password</label>
                <input type="password" id="new-pass" placeholder="••••••••" oninput="checkStrength()">
                <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
                <div class="strength-text" id="strength-text"></div>
            </div>

            <div class="field">
                <label>Confirm Password</label>
                <input type="password" id="confirm-pass" placeholder="••••••••">
            </div>

            <button class="btn-submit" id="btn-submit" onclick="submitReset()">Reset Password →</button>
        </div>

        <div class="success-msg" id="success-msg">
            <div class="check">✅</div>
            <p><span class="highlight">Password reset successful!</span><br>You can now sign in with your new password.</p>
            <a href="/auth.html">Go to Sign In →</a>
        </div>

        <div class="error-card" id="error-card">
            <div class="icon">⚠️</div>
            <p>Invalid or missing reset token.<br>Please request a new password reset link.</p>
            <br>
            <a href="/forgot-password">Request New Link →</a>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/api';
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    // Check if token exists
    if (!resetToken) {
        document.getElementById('form-section').style.display = 'none';
        document.getElementById('error-card').style.display = 'block';
    }

    function checkStrength() {
        const pass = document.getElementById('new-pass').value;
        const fill = document.getElementById('strength-fill');
        const text = document.getElementById('strength-text');

        let score = 0;
        if (pass.length >= 6) score++;
        if (pass.length >= 8) score++;
        if (/[A-Z]/.test(pass)) score++;
        if (/[0-9]/.test(pass)) score++;
        if (/[^A-Za-z0-9]/.test(pass)) score++;

        const levels = [
            { width: '0%', color: 'var(--border)', label: '' },
            { width: '20%', color: 'var(--danger)', label: 'Very weak' },
            { width: '40%', color: '#ff8c45', label: 'Weak' },
            { width: '60%', color: 'var(--warn)', label: 'Fair' },
            { width: '80%', color: 'var(--lime)', label: 'Strong' },
            { width: '100%', color: 'var(--success)', label: 'Very strong' }
        ];

        fill.style.width = levels[score].width;
        fill.style.background = levels[score].color;
        text.textContent = levels[score].label;
        text.style.color = levels[score].color;
    }

    async function submitReset() {
        const newPassword = document.getElementById('new-pass').value;
        const confirmPassword = document.getElementById('confirm-pass').value;
        const btn = document.getElementById('btn-submit');

        if (!newPassword || !confirmPassword) {
            showToast('Please fill in both fields', 'error');
            return;
        }

        if (newPassword.length < 6) {
            showToast('Password must be at least 6 characters', 'error');
            return;
        }

        if (newPassword !== confirmPassword) {
            showToast('Passwords do not match', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'RESETTING...';

        try {
            const res = await fetch(`${API}/auth/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: resetToken, newPassword })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            } else {
                showToast(data.message || 'Reset failed', 'error');
            }
        } catch (err) {
            showToast('Cannot connect to server', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Reset Password →';
        }
    }

    // Allow Enter key on confirm field
    document.getElementById('confirm-pass').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitReset();
    });

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast show${type ? ' ' + type : ''}`;
        clearTimeout(t._t);
        t._t = setTimeout(() => t.className = 'toast', 3200);
    }
</script>

</body>
</html>
