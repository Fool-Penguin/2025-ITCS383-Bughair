<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — FITNESS</title>
    <link rel="stylesheet" href="/auth-shared.css">
</head>
<body>

<nav>
    <a href="/auth.html" class="nav-logo">FITNESS</a>
</nav>

<div class="auth-container">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="card">
        <div class="card-icon">🔑</div>
        <h2>FORGOT <span>PASSWORD?</span></h2>
        <p class="desc">Enter the email address associated with your account. We'll send you a link to reset your password.</p>

        <div id="form-section">
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="reset-email" placeholder="name@example.com">
            </div>

            <button class="btn-submit" id="btn-submit" onclick="submitForgot()">Send Reset Link →</button>
        </div>

        <div class="success-msg" id="success-msg">
            <div class="check">✅</div>
            <p><span class="highlight">Reset link sent!</span><br>If an account exists for that email, you'll receive a password reset link shortly. Check your email (or the server console).</p>
            <div class="reset-link-box" id="reset-link-box"></div>
        </div>

        <div class="back-link">
            <a href="/auth.html">← Back to Sign In</a>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/api';

    async function submitForgot() {
        const email = document.getElementById('reset-email').value.trim();
        const btn = document.getElementById('btn-submit');

        if (!email) {
            showToast('Please enter your email address', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'SENDING...';
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 20000);

        try {
            const res = await fetch(`${API}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email }),
                signal: controller.signal
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                if (data.resetLink) {
                    const box = document.getElementById('reset-link-box');
                    box.style.display = 'block';
                    box.innerHTML = `<strong>Local demo reset link:</strong><br><a href="${data.resetLink}">${data.resetLink}</a>`;
                }
            } else {
                showToast(data.message || 'Something went wrong', 'error');
            }
        } catch (err) {
            const timedOut = err.name === 'AbortError';
            showToast(timedOut ? 'Email request timed out. Check server logs and try again.' : 'Cannot connect to server', 'error');
        } finally {
            clearTimeout(timeoutId);
            btn.disabled = false;
            btn.textContent = 'Send Reset Link →';
        }
    }

    // Allow Enter key
    document.getElementById('reset-email').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitForgot();
    });

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast show${type ? ' ' + type : ''}`;
        clearTimeout(t._t);
        t._t = setTimeout(() => t.className = 'toast', 3200);
    }
</script>

</body>
</html>
