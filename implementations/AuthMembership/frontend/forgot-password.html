<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — FITNESS</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0d0d; --bg2: #141414; --bg3: #1c1c1c;
            --lime: #c8f53c; --lime2: #d9ff52;
            --border: #2a2a2a; --text: #f2f2f0; --text2: #888; --r: 4px;
            --danger: #ff4545; --success: #4ade80;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column;
        }

        nav {
            height: 64px; display: flex; align-items: center;
            padding: 0 40px; background: rgba(13,13,13,0.95);
            border-bottom: 1px solid var(--border);
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
        }
        .nav-logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 3px; color: var(--lime); text-decoration: none; }

        .auth-container {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding-top: 64px; position: relative; overflow: hidden;
        }
        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);
            background-size: 60px 60px; opacity: .15;
        }
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(200,245,60,0.05) 0%, transparent 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }

        .card {
            position: relative; z-index: 1;
            max-width: 460px; width: 100%; margin: 20px;
            background: var(--bg2); border: 1px solid var(--border);
            padding: 50px 40px; border-radius: 2px;
        }

        .card-icon {
            width: 60px; height: 60px; border-radius: 50%;
            background: rgba(200,245,60,0.08); border: 1px solid rgba(200,245,60,0.2);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin-bottom: 25px;
        }

        h2 { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; letter-spacing: 2px; margin-bottom: 10px; }
        h2 span { color: var(--lime); }
        .desc { color: var(--text2); font-size: 0.88rem; line-height: 1.6; margin-bottom: 30px; }

        .field { margin-bottom: 20px; }
        .field label {
            display: block; font-size: 0.7rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text2); margin-bottom: 8px;
        }
        .field input {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            color: var(--text); font-family: 'Barlow', sans-serif; padding: 13px 15px;
            border-radius: var(--r); outline: none; transition: 0.2s; font-size: 0.95rem;
        }
        .field input:focus { border-color: var(--lime); }

        .btn-submit {
            width: 100%; background: var(--lime); color: #0d0d0d; border: none;
            padding: 14px; font-weight: 800; font-family: 'Barlow', sans-serif;
            text-transform: uppercase; letter-spacing: 2px; border-radius: var(--r);
            cursor: pointer; transition: 0.2s; font-size: 0.95rem;
        }
        .btn-submit:hover { background: var(--lime2); transform: translateY(-1px); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .back-link {
            text-align: center; margin-top: 25px; font-size: 0.85rem; color: var(--text2);
        }
        .back-link a { color: var(--lime); text-decoration: none; font-weight: 700; }
        .back-link a:hover { text-decoration: underline; }

        .success-msg {
            display: none; text-align: center; padding: 20px;
            background: rgba(74,222,128,0.08); border: 1px solid rgba(74,222,128,0.25);
            border-radius: 8px; margin-top: 20px;
        }
        .success-msg .check { font-size: 2.5rem; margin-bottom: 10px; }
        .success-msg p { color: var(--text2); font-size: 0.88rem; line-height: 1.6; }
        .success-msg .highlight { color: var(--success); font-weight: 700; }
        .reset-link-box {
            display: none; margin-top: 16px; padding: 12px;
            background: var(--bg3); border: 1px solid rgba(200,245,60,0.22);
            border-radius: 4px; word-break: break-all; text-align: left;
            font-size: 0.78rem; line-height: 1.5;
        }
        .reset-link-box a { color: var(--lime); }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--bg2); border: 1px solid var(--lime);
            border-radius: 10px; padding: 12px 18px; font-size: 0.85rem;
            z-index: 400; transform: translateY(80px); opacity: 0; transition: 0.28s;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: var(--danger); }
    </style>
</head>
<body>

<nav>
    <a href="/auth.html" class="nav-logo">FITNESS</a>
</nav>

<div class="auth-container">
    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <div class="card">
        <div class="card-icon">🔑</div>
        <h2>FORGOT <span>PASSWORD?</span></h2>
        <p class="desc">Enter the email address associated with your account. We'll send you a link to reset your password.</p>

        <div id="form-section">
            <div class="field">
                <label>Email Address</label>
                <input type="email" id="reset-email" placeholder="name@example.com">
            </div>

            <button class="btn-submit" id="btn-submit" onclick="submitForgot()">Send Reset Link →</button>
        </div>

        <div class="success-msg" id="success-msg">
            <div class="check">✅</div>
            <p><span class="highlight">Reset link sent!</span><br>If an account exists for that email, you'll receive a password reset link shortly. Check your email (or the server console).</p>
            <div class="reset-link-box" id="reset-link-box"></div>
        </div>

        <div class="back-link">
            <a href="/auth.html">← Back to Sign In</a>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    const API = '/api';

    async function submitForgot() {
        const email = document.getElementById('reset-email').value.trim();
        const btn = document.getElementById('btn-submit');

        if (!email) {
            showToast('Please enter your email address', 'error');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'SENDING...';

        try {
            const res = await fetch(`${API}/auth/forgot-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('form-section').style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
                if (data.resetLink) {
                    const box = document.getElementById('reset-link-box');
                    box.style.display = 'block';
                    box.innerHTML = `<strong>Local demo reset link:</strong><br><a href="${data.resetLink}">${data.resetLink}</a>`;
                }
            } else {
                showToast(data.message || 'Something went wrong', 'error');
            }
        } catch (err) {
            showToast('Cannot connect to server', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Send Reset Link →';
        }
    }

    // Allow Enter key
    document.getElementById('reset-email').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitForgot();
    });

    function showToast(msg, type = '') {
        const t = document.getElementById('toast');
        t.textContent = msg;
        t.className = `toast show${type ? ' ' + type : ''}`;
        clearTimeout(t._t);
        t._t = setTimeout(() => t.className = 'toast', 3200);
    }
</script>

</body>
</html>
